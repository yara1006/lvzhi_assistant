<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 律智助手</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --gold: #c9a84c;
      --paper: #f7f6f2;
      --border: rgba(26,26,46,0.08);
      --r: 10px;
      --r-lg: 14px;
    }
    body {
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-card {
      width: 360px;
      padding: 40px;
      background: white;
      border-radius: var(--r-lg);
      box-shadow: 0 4px 24px rgba(26,26,46,0.10);
    }
    .logo-badge {
      width: 48px;
      height: 48px;
      background: var(--gold);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
    }
    .login-title {
      font-size: 22px;
      text-align: center;
      margin-bottom: 30px;
      color: var(--ink);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-row {
      display: flex;
      gap: 10px;
    }
    .form-row .form-input {
      flex: 1;
    }
    .send-code-btn {
      padding: 12px;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: var(--r);
      cursor: pointer;
      font-size: 14px;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      color: white;
      border: none;
      border-radius: var(--r);
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    .error-msg {
      color: #c0392b;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-badge">⚖</div>
    <h1 class="login-title">律智助手 · 法内狂徒</h1>
    
    <div class="form-group">
      <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11">
    </div>
    
    <div class="form-row">
      <input type="text" class="form-input" id="code" placeholder="验证码" maxlength="6">
      <button class="send-code-btn" id="send-code">获取验证码</button>
    </div>
    
    <button class="login-btn" id="login-btn">登录</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    const API_BASE = '/api/v1';
    
    // 发送验证码
    document.getElementById('send-code').addEventListener('click', async () => {
      const phone = document.getElementById('phone').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';
      
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        errorMsg.textContent = '请输入正确的手机号';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/send-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();
        if (data.dev_code) {
          alert(`您的验证码是: ${data.dev_code}`);
        } else {
          errorMsg.textContent = data.message || '发送失败';
        }
      } catch (err) {
        errorMsg.textContent = '发送验证码失败';
      }
    });

    // 登录
    document.getElementById('login-btn').addEventListener('click', async () => {
      const phone = document.getElementById('phone').value;
      const code = document.getElementById('code').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';
      
      // 验证手机号
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        errorMsg.textContent = '请输入正确的手机号';
        return;
      }
      
      // 验证验证码
      if (!code || code.length !== 6) {
        errorMsg.textContent = '请先获取验证码并输入6位数字';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code })
        });
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('userId', data.user_id);
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.message || '验证码错误或已过期';
        }
      } catch (err) {
        errorMsg.textContent = '登录失败，请稍后重试';
      }
    });
  </script>
</body>
</html>
